<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <div class="profile-card">
        <div class="image">
            <img src="aa.jpg" alt="Ritik Raj" class="profile-img">
        </div>

        <div class="text-data">
            <span class="name">Ritik Raj</span>            
            <span class="job">Software Enginner | Backend Developer</span>
        </div>

        <div class="media-buttons">
            <a href="#" class="link">
                <i class="fa-brands fa-linkedin"></i>

            </a>

            <a href="#" style="background: black;" class="link">
                <i class="fa-brands fa-github"></i>
            </a>

            <a href="#" style="background: rgb(237, 59, 59);" class="link">
                <i class="fa-solid fa-envelope"></i>
            </a>

            <a href="#" style="background: rgb(104, 123, 233);" class="link">
                <i class="fa-solid fa-file"></i>
            </a>

        </div>

        <div class="buttons">
            <button class="button">Hire me</button>
            <button class="button">Contact me</button>
        </div>

        <div class="analytics">
            <div class="data">
                <i class="fa-regular fa-heart"></i>
                <span class="number">10k</span>
            </div>

            <div class="data">
                <i class="fa-regular fa-comment"></i>
                <span class="number">5k</span>
            </div>
            
            <div class="data">
                <i class="fa-solid fa-share"></i>
                <span class="number">3k</span>
            </div>

        </div>


    </div>

</body>

</html>
